<!DOCTYPE html>

<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kang Purwo Prompt Generator</title>

<style>
body{
background:#0f172a;
color:white;
font-family:Arial,sans-serif;
padding:20px;
}

.container{
max-width:1000px;
margin:auto;
}

h1{
text-align:center;
margin-bottom:20px;
}

.card{
background:#1e293b;
padding:20px;
border-radius:15px;
margin-bottom:20px;
}

label{
display:block;
margin-top:10px;
}

input,select,textarea{
width:100%;
padding:10px;
margin-top:5px;
border:none;
border-radius:8px;
}

button{
margin-top:15px;
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-size:16px;
}

.generate{
background:#22c55e;
color:white;
}

.copy{
background:#3b82f6;
color:white;
}

textarea{
height:280px;
}
</style>

</head>

<body>

<div class="container">

<div style="text-align: center;"><img src="kangp.gif" width="200" height="200"></div>
<h1>Studio Room Prompt Generator</h1>
<h1><p style="color: gray;">Keperluan Masking</p></H1>

<div class="card">

<label>Tema Room</label> <select id="theme">

<option>Rumah Bugis </option>
<option>Villa Pegunungan</option>
<option>VIP Racing Lounge</option>
<option>Gaming Cyber Cafe</option>
<option>Rumah Bali</option>
<option>Rumah Jawa</option>
<option>Pandopo bali</option>
<option>Pendopo jawa</option>
<option>Rumah bambu </option>
</select>

<label>Style</label> <select id="style">

<option>Ultra Realistic</option>
<option>Cinematic</option>
<option>Photorealistic</option>
<option>Luxury</option>
</select>

<label>Resolusi</label> <select id="resolution">

<option>8K</option>
<option>4K</option>
</select>

<label>Aspect Ratio</label> <select id="ratio">

<option>9:16</option>
<option>16:9</option>
<option>1:1</option>
</select>

<label>Tambahan Detail</label> <input id="detail" placeholder="monitor banyak, lampu LED, kebun teh, dll">

<button class="generate" onclick="generatePrompt()">
Generate Prompt
</button>

</div>

<div class="card">

<h3>Hasil Prompt</h3>

<textarea id="result"></textarea>

<button class="copy" onclick="copyPrompt()">
Copy Prompt
</button>

</div>

</div>

<script>

function generatePrompt(){

let theme=document.getElementById("theme").value;
let style=document.getElementById("style").value;
let resolution=document.getElementById("resolution").value;
let ratio=document.getElementById("ratio").value;
let detail=document.getElementById("detail").value;

let prompt=`
Expand the original streaming room into a ${theme}. Preserve the exact desk setup, monitor placement, camera angle, lighting direction, streaming equipment and workspace layout.

Transform the environment into ${theme} with rich architectural details and realistic surroundings.

Add:
${detail}

Professional TikTok Studio setup,
multiple monitors,
streaming workstation,
luxury atmosphere,
cinematic lighting,
realistic shadows,
depth of field,
ultra detailed textures,
high realism,
photorealistic,
${style},
${resolution},
aspect ratio ${ratio},
masterpiece quality,
HDR,
global illumination.
`;

document.getElementById("result").value=prompt;
}

function copyPrompt(){

let text=document.getElementById("result");

text.select();

navigator.clipboard.writeText(text.value);

alert("Prompt berhasil dicopy!");
}

</script>

</body>
</html>
