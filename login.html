<!DOCTYPE html>
<html>
<head>
<title>Login</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap');

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
background:url('kgpurwo.png') center center/cover no-repeat fixed;
min-height:100vh;
display:flex;
justify-content:center;
align-items:center;
padding:20px;
}

.box{
width:100%;
max-width:400px;

background:rgba(255,255,255,0.05);
backdrop-filter:blur(15px);
-webkit-backdrop-filter:blur(15px);

border:1px solid rgba(255,255,255,0.1);

padding:35px;
border-radius:20px;

box-shadow:
0 10px 30px rgba(0,0,0,0.4);

text-align:center;
}

.logo{
margin-bottom:15px;
}

.logo img{
width:120px;
height:120px;
object-fit:contain;
border-radius:50%;
padding:8px;

background:rgba(255,255,255,.05);

box-shadow:
0 0 30px rgba(34,197,94,.3);
}

h2{
color:white;
margin-bottom:5px;
}

.subtitle{
color:#94a3b8;
font-size:14px;
margin-bottom:25px;
}

input{
width:100%;
padding:14px;

margin-bottom:15px;

border-radius:12px;
border:1px solid rgba(255,255,255,.1);

background:rgba(255,255,255,.08);

color:white;
font-size:15px;
outline:none;

transition:.3s;
}

input::placeholder{
color:#94a3b8;
}

input:focus{
border-color:#22c55e;

box-shadow:
0 0 15px rgba(34,197,94,.4);
}

button{
width:100%;
padding:14px;

border:none;
border-radius:12px;

font-size:15px;
font-weight:600;

cursor:pointer;

background:linear-gradient(
135deg,
#22c55e,
#16a34a
);

color:white;

transition:.3s;
}

button:hover{
transform:translateY(-2px);

box-shadow:
0 8px 25px rgba(34,197,94,.5);
}

.popup{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;

    background:rgba(0,0,0,.6);

    display:none;
    justify-content:center;
    align-items:center;

    z-index:9999;
}

.popup-box{
    width:90%;
    max-width:350px;

    background:rgba(15,23,42,.95);

    backdrop-filter:blur(15px);

    border:1px solid rgba(255,255,255,.1);

    border-radius:20px;

    padding:25px;

    text-align:center;

    color:white;

    box-shadow:
    0 10px 30px rgba(0,0,0,.4);
}

.popup-box h3{
    color:#ef4444;
    margin-bottom:10px;
}

.popup-box p{
    color:#cbd5e1;
    margin-bottom:20px;
}

.popup-box button{
    width:100%;

    background:linear-gradient(
        135deg,
        #ef4444,
        #dc2626
    );

    color:white;
}
</style>
</head>

<body>
    <div id="popup" class="popup">
    <div class="popup-box">
        <h3>Login Gagal</h3>
        <p>Username atau Password salah!</p>
        <button onclick="closePopup()">OK</button>
    </div>
</div>

<div class="box">

<div class="logo">
<img src="kangp.gif">
</div>

<h2>KANG PURWO</h2>

<div class="subtitle">
Studio Room Prompt Generator
</div>

<input
type="text"
id="username"
placeholder="Masukkan Username">

<input
type="password"
id="password"
placeholder="Masukkan Password">

<button onclick="login()">
Masuk
</button>

</div>
<script>

const users = [
{
username:"micola",
password:"123456"
},
{
username:"admin00",
password:"admin00"
}
];

function login(){

const username =
document.getElementById("username").value;

const password =
document.getElementById("password").value;

const user = users.find(
u =>
u.username === username &&
u.password === password
);

if(user){

localStorage.setItem(
"isLogin",
"true"
);

localStorage.setItem(
"username",
user.username
);

window.location.href =
"index.html";

}else{

showPopup();

}

}
function showPopup(){
    document.getElementById("popup").style.display = "flex";
}

function closePopup(){
    document.getElementById("popup").style.display = "none";
}

</script>

</body>
</html>
